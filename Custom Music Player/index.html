<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>oomba goomba</title>

	<link rel="stylesheet" href="styles.css">
	<script src="app.js" defer></script>
</head>
<body>
	<div id="main-container">
		<!-- header -->

		<header id="header" class="layout-section">

		</header>

		<!-- sidebar -->

		<aside id="sidebar" class="layout-section">
			<button id="sidebar-resizer" class="resizer"></button>

			<div id="sidebar-header">
				<h1>Library</h1>
			</div>

			<div id="sidebar-content">
				<div id="playlists">
					<div class="playlist">
						<img src="Images/cover.jpg" alt="song">

						<p class="playlist-name">Playlist Name</p>
						<p class="creator-name">Creator Name</p>
					</div>

					<div class="playlist">
						<img src="Images/cover.jpg" alt="song">

						<p class="playlist-name">Playlist Name</p>
						<p class="creator-name">Creator Name</p>
					</div>

					<div class="playlist">
						<img src="Images/cover.jpg" alt="song">

						<p class="playlist-name">Playlist Name</p>
						<p class="creator-name">Creator Name</p>
					</div>

					<div class="playlist">
						<img src="Images/cover.jpg" alt="song">

						<p class="playlist-name">Playlist Name</p>
						<p class="creator-name">Creator Name</p>
					</div>

					<div class="playlist">
						<img src="Images/cover.jpg" alt="song">

						<p class="playlist-name">Playlist Name</p>
						<p class="creator-name">Creator Name</p>
					</div>
				</div>
			</div>
		</aside>

		<!-- main content -->

		<main id="content" class="layout-section">
			
		</main>

		<!-- footer -->

		<footer id="footer" class="layout-section">
			<div id="footer-left">
				
			</div>
			
			<div id="footer-middle">
				<button id="shuffle">
					<svg xmlns="http://www.w3.org/2000/svg" height="26px" viewBox="0 -960 960 960" width="26px" fill="#FFFFFF"><path d="M560-160v-80h104L537-367l57-57 126 126v-102h80v240H560Zm-344 0-56-56 504-504H560v-80h240v240h-80v-104L216-160Zm151-377L160-744l56-56 207 207-56 56Z"/></svg>
				</button>
	
				<button id="skip-previous">
					<svg xmlns="http://www.w3.org/2000/svg" height="26px" viewBox="0 -960 960 960" width="26px" fill="#FFFFFF"><path d="M220-240v-480h80v480h-80Zm520 0L380-480l360-240v480Zm-80-240Zm0 90v-180l-136 90 136 90Z"/></svg>
				</button>
	
				<button id="play-pause">
					<svg xmlns="http://www.w3.org/2000/svg" height="35px" viewBox="0 -960 960 960" width="35px" fill="#FFFFFF"><path d="m380-300 280-180-280-180v360ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
				</button>
	
				<button id="skip-next">
					<svg xmlns="http://www.w3.org/2000/svg" height="26px" viewBox="0 -960 960 960" width="26px" fill="#FFFFFF"><path d="M660-240v-480h80v480h-80Zm-440 0v-480l360 240-360 240Zm80-240Zm0 90 136-90-136-90v180Z"/></svg>
				</button>
	
				<button id="add-to-playlist">
					<svg xmlns="http://www.w3.org/2000/svg" height="26px" viewBox="0 -960 960 960" width="26px" fill="#FFFFFF"><path d="M120-320v-80h280v80H120Zm0-160v-80h440v80H120Zm0-160v-80h440v80H120Zm520 480v-160H480v-80h160v-160h80v160h160v80H720v160h-80Z"/></svg>
				</button>
			</div>

			<div id="footer-right">
				<button id="volume-button">
					<svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#FFFFFF"><path d="M560-131v-82q90-26 145-100t55-168q0-94-55-168T560-749v-82q124 28 202 125.5T840-481q0 127-78 224.5T560-131ZM120-360v-240h160l200-200v640L280-360H120Zm440 40v-322q47 22 73.5 66t26.5 96q0 51-26.5 94.5T560-320ZM400-606l-86 86H200v80h114l86 86v-252ZM300-480Z"/></svg>
				</button>

				<input id="volume-slider" type="range" min="0" max="100" value="50">

				<p id="volume-value">50%</p>
			</div>
		</footer>
	</div>
</body>
</html>
